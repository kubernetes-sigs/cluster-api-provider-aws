apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: multi-tenancy
spec:
  controlPlane:
    templateRef:
      kind: KubeadmControlPlaneTemplate
      name: multi-tenancy-control-plane
    machineInfrastructure:
      templateRef:
        kind: AWSMachineTemplate
        name: multi-tenancy-control-plane
  infrastructure:
    templateRef:
      kind: AWSClusterTemplate
      name: multi-tenancy
  workers:
    machineDeployments:
    - class: default-worker
      bootstrap:
        templateRef:
          kind: KubeadmConfigTemplate
          name: multi-tenancy-worker-bootstraptemplate
      infrastructure:
        templateRef:
          kind: AWSMachineTemplate
          name: multi-tenancy-worker-machinetemplate
  variables:
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: us-east-1
    - name: sshKeyName
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: default
    - name: controlPlaneMachineType
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: t3.large
    - name: workerMachineType
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: t3.large
    - name: bastionEnabled
      required: false
      schema:
        openAPIV3Schema:
          type: boolean
    - name: vpcAZUsageLimit
      required: false
      schema:
        openAPIV3Schema:
          type: integer
    - name: identityRef
      required: false
      schema:
        openAPIV3Schema:
          type: object
          properties:
            kind:
              type: string
            name:
              type: string
          required:
          - kind
          - name
  patches:
    - name: awsClusterTemplateGeneral
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: "/spec/template/spec/region"
              valueFrom:
                variable: region
            - op: add
              path: "/spec/template/spec/sshKeyName"
              valueFrom:
                variable: sshKeyName
            - op: replace
              path: "/spec/template/spec/bastion/enabled"
              valueFrom:
                variable: bastionEnabled
            - op: replace
              path: "/spec/template/spec/network/vpc/availabilityZoneUsageLimit"
              valueFrom:
                variable: vpcAZUsageLimit
            - op: replace
              path: "/spec/template/spec/identityRef"
              valueFrom:
                variable: identityRef
    - name: awsMachineTemplateControlPlane
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: "/spec/template/spec/instanceType"
              valueFrom:
                variable: controlPlaneMachineType
            - op: add
              path: "/spec/template/spec/sshKeyName"
              valueFrom:
                variable: sshKeyName
    - name: awsMachineTemplateWorker
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: "/spec/template/spec/instanceType"
              valueFrom:
                variable: workerMachineType
            - op: add
              path: "/spec/template/spec/sshKeyName"
              valueFrom:
                variable: sshKeyName
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterTemplate
metadata:
  name: multi-tenancy
spec:
  template:
    spec:
      controlPlaneLoadBalancer:
        loadBalancerType: nlb
        healthCheckProtocol: HTTPS
---
kind: KubeadmControlPlaneTemplate
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
metadata:
  name: multi-tenancy-control-plane
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          controllerManager:
            extraArgs:
            - name: cloud-provider
              value: external
        initConfiguration:
          nodeRegistration:
            name: '{{ ds.meta_data.local_hostname }}'
            kubeletExtraArgs:
            - name: cloud-provider
              value: external
        joinConfiguration:
          nodeRegistration:
            name: '{{ ds.meta_data.local_hostname }}'
            kubeletExtraArgs:
            - name: cloud-provider
              value: external
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: multi-tenancy-control-plane
spec:
  template:
    spec:
      # instanceType is a required field (OpenAPI schema).
      instanceType: REPLACEME
      iamInstanceProfile: "control-plane.cluster-api-provider-aws.sigs.k8s.io"
      rootVolume:
        size: 10
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: multi-tenancy-worker-machinetemplate
spec:
  template:
    spec:
      # instanceType is a required field (OpenAPI schema).
      instanceType: REPLACEME
      iamInstanceProfile: "nodes.cluster-api-provider-aws.sigs.k8s.io"
      rootVolume:
        size: 10
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: "multi-tenancy-worker-bootstraptemplate"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          name: '{{ ds.meta_data.local_hostname }}'
          kubeletExtraArgs:
          - name: cloud-provider
            value: external
