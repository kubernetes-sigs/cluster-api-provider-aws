apiVersion: cluster.x-k8s.io/v1beta1
kind: MachinePool
metadata:
  name: "${CLUSTER_NAME}-pool-byo-lt-0"
spec:
  clusterName: "${CLUSTER_NAME}"
  replicas: ${WORKER_MACHINE_COUNT}
  template:
    spec:
      version: "${KUBERNETES_VERSION}"
      clusterName: "${CLUSTER_NAME}"
      bootstrap:
        dataSecretName: ""
      infrastructureRef:
        name: "${CLUSTER_NAME}-pool-byo-lt-0"
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSManagedMachinePool
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSManagedMachinePool
metadata:
  name: "${CLUSTER_NAME}-pool-byo-lt-0"
spec:
  eksNodegroupName: "${CLUSTER_NAME}-pool-byo-lt-0"
  # instanceType must not be set when using a BYO launch template — EKS uses
  # the type configured inside the launch template itself.
  awsLaunchTemplate:
    id: "${BYO_LAUNCH_TEMPLATE_ID}"
    versionNumber: ${BYO_LAUNCH_TEMPLATE_VERSION}
  scaling:
    minSize: 1
    maxSize: 2
