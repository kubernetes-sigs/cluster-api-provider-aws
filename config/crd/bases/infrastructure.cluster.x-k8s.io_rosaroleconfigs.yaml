                                  type: string
                              required:
                              - name
                              type: object
                            issuerURL:
                              description: |-
                                URL is the serving URL of the token issuer.
                                Must use the https:// scheme.
                              pattern: ^https:\/\/[^\s]
                              type: string
                          required:
                          - audiences
                          - issuerURL
                          type: object
                        name:
                          description: Name of the OIDC provider
                          minLength: 1
                          type: string
                        oidcClients:
                          description: |-
                            OIDCClients contains configuration for the platform's clients that
                            need to request tokens from the issuer
                          items:
                            description: |-
                              OIDCClientConfig contains configuration for the platform's client that
                              need to request tokens from the issuer.
                            properties:
                              clientID:
                                description: ClientID is the identifier of the OIDC
                                  client from the OIDC provider
                                minLength: 1
                                type: string
                              clientSecret:
                                description: |-
                                  ClientSecret refers to a secret that
                                  contains the client secret in the `clientSecret` key of the `.data` field
                                properties:
                                  name:
                                    description: Name is the metadata.name of the
                                      referenced object.
                                    type: string
                                required:
                                - name
                                type: object
                              componentName:
                                description: |-
                                  ComponentName is the name of the component that is supposed to consume this
                                  client configuration
                                maxLength: 256
                                minLength: 1
                                type: string
                              componentNamespace:
                                description: |-
                                  ComponentNamespace is the namespace of the component that is supposed to consume this
                                  client configuration
                                maxLength: 63
                                minLength: 1
                                type: string
                              extraScopes:
                                description: ExtraScopes is an optional set of scopes
                                  to request tokens with.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: set
                            required:
                            - clientID
                            - clientSecret
                            - componentName
                            - componentNamespace
                            type: object
                          maxItems: 20
                          type: array
