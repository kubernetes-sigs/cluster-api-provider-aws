name: detect-k8s-releases

on:
  schedule:
    # Runs at midnight UTC on the 1st and 15th of each month,
    # aligned with the Kubernetes monthly patch release cadence.
    - cron: '0 0 1,15 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    name: Detect latest K8s releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: hack/tools/release-tools/go.mod
          cache-dependency-path: hack/tools/release-tools/go.sum

      - name: Build release-tool
        working-directory: hack/tools/release-tools
        run: go build -o ../../../bin/release-tool .

      - name: Detect latest K8s releases (CAPA policy)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hack/tools/release-tools/ami/k8srelease/data
          ./bin/release-tool ami detect-k8s-release --token "$GITHUB_TOKEN" --output json > hack/tools/release-tools/ami/k8srelease/data/AMIBuildConfig.json

      - name: Open PR if versions changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-k8s-supported-versions
          commit-message: "feat: update latest K8s version for CAPA AMI build"
          title: "🤖 feat: Update latest K8s version for CAPA AMI build"
          body: |
            This is an automated pull request to update the latest K8s version for CAPA AMI build.
            - [Kubernetes latest release](https://github.com/kubernetes/kubernetes/releases)
            - Automated update of `hack/tools/release-tools/ami/k8srelease/data/AMIBuildConfig.json` with the latest three minor Kubernetes versions and their patch releases, following the [CAPA AMI policy](https://cluster-api-aws.sigs.k8s.io/topics/images/built-amis#ami-publication-policy).
            - The update is generated by the Github Action workflow `detect-k8s-releases` using command: `release-tool ami detect-k8s-release`.
          add-paths: hack/tools/release-tools/ami/k8srelease/data/AMIBuildConfig.json
