name: detect-k8s-releases

on:
  schedule:
    # Runs at midnight UTC on the 1st and 15th of each month,
    # aligned with the Kubernetes monthly patch release cadence.
    - cron: '0 0 1,15 * *'
  workflow_dispatch: {}

env:
  AWS_ACCOUNT_ID: "819546954734"
  AWS_REGION: "us-east-2" # single region used for OIDC authentication

jobs:
  detect:
    name: Detect latest K8s releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for OIDC authentication to AWS
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: hack/tools/release-tools/go.mod
          cache-dependency-path: hack/tools/release-tools/go.sum

      - name: Build release-tool
        working-directory: hack/tools/release-tools
        run: go build -o ../../../bin/release-tool .

      - name: Detect latest K8s releases (following CAPA policy)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hack/tools/release-tools/internal/ami/k8srelease/data
          ./bin/release-tool ami detect-k8s-release --token "$GITHUB_TOKEN" --output json > hack/tools/release-tools/internal/ami/k8srelease/data/AMIK8sBuildConfig.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gh-image-builder

      - name: Generate AMI inventory report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          K8S_CONFIG_PATH: hack/tools/release-tools/internal/ami/k8srelease/data/AMIK8sBuildConfig.json
        run: bash scripts/generate-ami-inventory-report.sh

      - name: Open PR if versions changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-k8s-supported-versions
          commit-message: "feat: update latest K8s version for CAPA AMIs build"
          title: "🤖 feat: Update latest K8s version for CAPA AMIs build"
          body: |
            This is an automated pull request to update the latest K8s version for CAPA AMIs build.
            - [Kubernetes latest release](https://github.com/kubernetes/kubernetes/releases)
            - Automated update of `hack/tools/release-tools/internal/ami/k8srelease/data/AMIK8sBuildConfig.json` with the latest three minor Kubernetes versions and their patch releases, following the [CAPA AMI policy](https://cluster-api-aws.sigs.k8s.io/topics/images/built-amis#ami-publication-policy).
            - The update is generated by the Github Action workflow `detect-k8s-releases` using command: `release-tool ami detect-k8s-release`.
          add-paths: |
            hack/tools/release-tools/internal/ami/k8srelease/data/AMIK8sBuildConfig.json
            docs/book/src/development/ami-inventory.md
