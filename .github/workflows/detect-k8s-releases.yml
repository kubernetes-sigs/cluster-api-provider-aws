name: detect-k8s-releases

on:
  schedule:
    - cron: '0 0 15 * *' # the workflow scheduled to run on the 15th of each month based on patch release calendar: https://kubernetes.io/releases/patch-releases/
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-versions:
    name: Update K8s supported versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Update K8s supported versions
        run: ./scripts/update-k8s-supported-versions.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: k8s-versions-update
          delete-branch: true
          add-paths: hack/k8s-supported-versions.json
          title: "🌱 chore: update K8s supported versions"
          body: |
            Automated update of the K8s supported versions file.

            This PR updates `hack/k8s-supported-versions.json` with the current supported Kubernetes release series and the latest patch version per series.
          commit-message: "chore: update K8s supported versions"
