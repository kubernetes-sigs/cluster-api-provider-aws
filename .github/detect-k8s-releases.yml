name: detect-k8s-releases

on:
  # schedule:
    # Runs at midnight UTC on the 1st and 15th of each month,
    # aligned with the Kubernetes monthly patch release cadence.
    # - cron: '0 0 1,15 * *'
  push:
    branches:
      - '*'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    name: Detect latest K8s releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build clusterawsadm
        run: go build -o bin/clusterawsadm ./cmd/clusterawsadm

      - name: Detect latest K8s releases (CAPA policy)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hack/tools/ami
          ./bin/clusterawsadm detect-k8s-release capa --output json --token "$GITHUB_TOKEN" > hack/tools/ami/AMIBuildConfig.json

      - name: Open PR if versions changed
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-k8s-supported-versions
          commit-message: "feat: update latest K8s version for CAPA AMI build"
          title: "🤖 feat: Update latest K8s version for CAPA AMI build"
          body: |
            This is an automated pull request to update the latest K8s version for CAPA AMI build.
            - [Kubernetes latest release](https://github.com/kubernetes/kubernetes/releases)
            - Automated update of `hack/tools/ami/AMIBuildConfig.json` with the latest three minor Kubernetes versions and their patch releases, following the [CAPA AMI policy](https://cluster-api-aws.sigs.k8s.io/topics/images/built-amis#ami-publication-policy).
            - The update is generated by the Github Action workflow `detect-k8s-releases` using command: `clusterawsadm detect-k8s-release capa`.
          add-paths: hack/tools/ami/AMIBuildConfig.json
